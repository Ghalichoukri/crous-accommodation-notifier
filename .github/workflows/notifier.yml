name: CROUS Telegram Notifier

on:
  workflow_dispatch:
  schedule:
    # Toutes les 6h, à 14h15, 20h15, 02h15, 08h15 heure de Paris en été
    # GitHub cron est en UTC : 12h15, 18h15, 00h15, 06h15 UTC
    - cron: "15 0,6,12,18 * * *"

concurrency:
  group: crous-bot
  cancel-in-progress: true

jobs:
  run-crous-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore seen cache
        uses: actions/cache@v4
        with:
          path: seen_accommodations.json
          key: crous-seen-${{ github.run_id }}
          restore-keys: |
            crous-seen-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 selenium

      - name: Run CROUS bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CROUS_URLS: ${{ secrets.CROUS_URLS }}
          CHECK_INTERVAL_SECONDS: "30"
          RUN_MINUTES: "350"
          SEND_STATUS_EVERY_CHECK: "false"
          NOTIFY_ALL_AVAILABLE: "true"
          SEND_START_MESSAGE: "false"
          SEND_HEARTBEAT_AT_END: "true"
        run: python main.py
`
